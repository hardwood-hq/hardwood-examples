name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Discover every example (any top-level directory with a pom.xml) so a new
  # example is picked up automatically — no workflow change required.
  discover:
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.find.outputs.examples }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
      - id: find
        run: |
          examples=$(find . -mindepth 2 -maxdepth 2 -name pom.xml -printf '%h\n' \
            | sed 's|^\./||' | sort | jq -R . | jq -sc .)
          echo "examples=$examples" >> "$GITHUB_OUTPUT"
          echo "Discovered examples: $examples"

          # The root pom.xml is a build aggregator whose <modules> list is maintained by
          # hand, while the examples above are discovered automatically. Guard against the
          # two drifting apart — e.g. a new example added without registering it in the
          # aggregator — by asserting the module list matches the discovered set exactly.
          modules=$(grep -oP '<module>\K[^<]+(?=</module>)' pom.xml | sort | jq -R . | jq -sc .)
          if [ "$modules" != "$examples" ]; then
            echo "::error file=pom.xml::Root pom.xml <modules> is out of sync with the example directories."
            echo "  discovered: $examples"
            echo "  modules:    $modules"
            exit 1
          fi

  build:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.discover.outputs.examples) }}
    name: build (${{ matrix.example }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5 — https://github.com/actions/setup-java/releases/tag/v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Cache the downloaded sample data so the NYC TLC CDN is hit at most once per
      # dataset, instead of on every run. That CDN intermittently returns 403 to CI
      # runners (rate-limit / IP reputation), so minimizing requests keeps the build
      # green. The key tracks Datasets.java, so changing the file to fetch re-downloads.
      - name: Restore sample data cache
        id: sample-data-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5 — https://github.com/actions/cache/releases/tag/v5
        with:
          path: ${{ matrix.example }}/data
          key: data-${{ matrix.example }}-${{ hashFiles(format('{0}/**/Datasets.java', matrix.example)) }}

      - name: Build and run
        working-directory: ${{ matrix.example }}
        run: ./mvnw -B -q compile exec:java

      # Persist the data only on success, and only when we actually had to download
      # it (a restore hit needs no re-save). This keeps a partial dataset from a
      # failed download being frozen under the immutable key.
      - name: Save sample data cache
        if: success() && steps.sample-data-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5 — https://github.com/actions/cache/releases/tag/v5
        with:
          path: ${{ matrix.example }}/data
          key: data-${{ matrix.example }}-${{ hashFiles(format('{0}/**/Datasets.java', matrix.example)) }}
