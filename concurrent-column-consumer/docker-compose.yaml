# Run in a container:  docker compose run --rm --build concurrent-column-consumer
# The downloaded data/ folder is kept on a volume and reused across runs.
services:
  concurrent-column-consumer:
    build:
      context: .
    volumes:
      - hardwood-data:/app/data

volumes:
  hardwood-data:
